<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kenjay Dorio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../images/Dorio, Kenjay .jpg">
    <style>
        /* VIDEO SECTION - side by side layout */
        .video-section {
            padding: 60px 40px;
        }

        .video-wrapper {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            max-width: 1300px;
            margin: 0 auto;
        }

        .video-container {
            flex: 1 1 500px;
            max-width: 600px;
            transition: box-shadow 0.3s ease;
        }

        .video-container:hover {
            box-shadow: 0 0 25px rgba(95, 111, 134, 0.5);
        }

        /* PROJECTS SECTION */
        .projects-section {
            background: radial-gradient(circle at center, #1a1a1a, #0a0a0a);
            padding: 80px 50px;
            text-align: center;
            color: #f4f4f4;
        }

        .projects-section h2 {
            font-size: 70px;
            letter-spacing: 5px;
            font-weight: 700;
            background: linear-gradient(to bottom, #ffffff, #aaaaaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .projects-section .section-intro {
            color: #d9d9d9;
            font-size: 15px;
            margin-bottom: 50px;
        }

        .projects-grid {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* CARDS - matches .project-card from style.css but with link support */
        .project-card {
            background: #111;
            border-radius: 15px;
            width: 260px;
            overflow: hidden;
            text-decoration: none;
            color: #f4f4f4;
            display: block;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .project-card-thumbnail {
            width: 100%;
            height: 160px;
            background: #1c2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            letter-spacing: 3px;
            font-weight: 700;
            color: #5f6f86;
            position: relative;
            overflow: hidden;
        }

        .project-card-thumbnail::before {
            content: '';
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(95, 111, 134, 0.1);
            top: -25px;
            right: -25px;
        }

        .project-card-thumbnail::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(95, 111, 134, 0.07);
            bottom: -10px;
            left: 15px;
        }

        .project-card-body {
            padding: 20px;
            text-align: left;
        }

        .project-card-body h3 {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 8px;
        }

        .project-card-body p {
            font-size: 14px;
            color: #d9d9d9;
            margin: 0 0 14px;
            line-height: 1.6;
        }

        .project-card a {
            display: inline-block;
            margin-top: 15px;
            color: #5f6f86;
            text-decoration: none;
            font-size: 14px;
        }

        .project-card a:hover {
            text-decoration: underline;
        }

        .project-card-link-hint {
            font-size: 13px;
            color: #5f6f86;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s ease;
        }

        .project-card:hover .project-card-link-hint {
            color: #d9d9d9;
        }

        .project-card-link-hint::after {
            content: '→';
        }

        /* TABLET */
        @media (max-width: 768px) {
            .projects-section {
                padding: 70px 30px;
            }

            .projects-section h2 {
                font-size: 50px;
                letter-spacing: 3px;
            }

            .project-card {
                width: 220px;
            }

            .video-wrapper {
                flex-direction: column;
                align-items: center;
            }

            .video-container {
                flex: none;
                width: 100%;
                max-width: 500px;
            }
        }

        /* PHONE */
        @media (max-width: 480px) {
            .projects-section {
                padding: 60px 20px;
            }

            .projects-section h2 {
                font-size: 36px;
                letter-spacing: 2px;
            }

            .projects-grid {
                flex-direction: column;
                align-items: center;
            }

            .project-card {
                width: 100%;
                max-width: 340px;
            }

            .video-section {
                padding: 50px 15px;
            }

            .video-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo">Kenjay</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="About me.html">About me</a>
        <a href="#" class="active">Project</a>
        <a href="Contacts.html">Contact</a>
    </nav>
</header>

<!-- VIDEO SECTION -->
<section class="video-section">
    <h2>My Demo reel</h2>
    <div class="video-wrapper">
        <div class="video-container">
            <video controls>
                <source src="../images/demo.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="video-container">
            <video controls>
                <source src="../images/demo2.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</section>

<!-- PROJECTS SECTION -->
<section class="projects-section">
    <h2>My Projects</h2>
    <p class="section-intro">A collection of work I've built and contributed to.</p>
    <div class="projects-grid">

        <!-- ESC Website Card -->
        <a class="project-card" href="https://esc.edu.ph" target="_blank" rel="noopener noreferrer">
            <div class="project-card-thumbnail">ESC</div>
            <div class="project-card-body">
                <h3>ESC Website</h3>
                <p>The official website for ESC. Click to visit the live site.</p>
                <span class="project-card-link-hint">Visit site</span>
            </div>
        </a>

        <!-- Placeholder for future project -->
        <div class="project-card" style="cursor: default; opacity: 0.5;">
            <div class="project-card-thumbnail" style="font-size: 2rem; color: #444;">+ Soon</div>
            <div class="project-card-body">
                <h3>Coming Soon</h3>
                <p>Another project is on its way. Stay tuned!</p>
            </div>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer>
    <div class="iconics">
        <img class="footer-icon" src="../images/facebook.png">
        <img class="footer-icon" src="../images/github.png">
        <img class="footer-icon" src="../images/instagram.png">
    </div>
    <h3>2026 | Kenjay Dorio.</h3>
</footer>
</body>
</html>
